name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Addon Zip
        run: |
          # Create the zip file containing the bezier_utils folder
          # The zip should extract to bezier_utils/ so Blender can recognize it
          zip -r bezier_utils.zip bezier_utils/ \
            -x "bezier_utils/__pycache__/*" \
            -x "bezier_utils/*/__pycache__/*" \
            -x "bezier_utils/*/*/__pycache__/*" \
            -x "bezier_utils/.claude/*" \
            -x "bezier_utils/.git/*" \
            -x "bezier_utils/.ruff_cache/*" \
            -x "bezier_utils/.ruff_cache/*/*" \
            -x "bezier_utils/.docs/*" \
            -x "bezier_utils/*.pyc" \
            -x "bezier_utils/*/*.pyc" \
            -x "bezier_utils/*/*/*.pyc" \
            -x "bezier_utils/.gitignore" \
            -x "bezier_utils/CLAUDE.md"

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Bezier Utilities ${{ steps.get_version.outputs.VERSION }}
          body: |
            # Bézier Utilities for Blender

            **Version:** ${{ steps.get_version.outputs.VERSION }}
            **Supported Blender Versions:** 4.2 LTS, 4.3+, 5.0, 5.1+

            > **Note:** This version is optimized for **Blender 5.1**. If you experience issues with earlier Blender versions, please use [v1.0.0-beta](https://github.com/Shriinivas/blenderbezierutils/releases/tag/v1.0.0-beta).

            ## Installation

            1. Download `bezier_utils.zip` from the assets below
            2. Open Blender and select Edit → Preferences
            3. Click "Add-ons" tab and then "Install Add-on from File"
            4. Select the downloaded `bezier_utils.zip` file
            5. Check the 'Bézier Utilities' option in the add-ons dialog

            ## What's New in v1.1.2

            ### New Features
            - **Surface-Following (Curve on Mesh)** - Added a new **'Surface (Follow Mesh)'** transform orientation option. While drawing, control points snap to the mesh surface. Upon finalization, the segment paths are calculated, and crossover points are automatically inserted at mesh edges with projection-correct handle alignments.
            - **Surface Modes (Exact vs. Smooth)** - Added a new `surfaceMode` dropdown with **Exact (Crease)** and **Smooth (Transition)** modes to toggle whether segment boundaries form creases or smooth transitions.
            - **Dynamic Filtering** - The **'Surface (Follow Mesh)'** option is context-aware and automatically filtered out when editing curves, showing up only during active drawing.
            - **Separate Face and Surface Presets** - Split the previous Surface preset into two separate presets: **Face Align** (snapping and aligning orientation/origin to the active face) and **Surface (Follow Mesh)** (drawing curves that walk along the mesh surface).
            - **Surface-Following for Primitive Shapes** - Supported the **'Surface (Follow Mesh)'** mode for drawing 2D visual primitives (Rectangle, Ellipse, Polygon, Star). Shapes are drawn visually flat on the view plane and projected/wrapped onto the active mesh surface on finalization, matching the real-time rubber-band preview exactly.

            ### UI & Workflow Improvements
            - **Surface (Normal) Drawing Plane** - Fixed drawing with the **Surface (Normal)** preset, where subsequent points and handles were projected onto the view plane instead of the locked face plane. The drawing canvas now correctly defaults to the local face plane (XY plane) under `'FACE'` orientation.

            ## Video Tutorials

            https://www.youtube.com/playlist?list=PLxsh4i5F_h9G6QFoPzKvBRMayz8533fSW

            ## Support

            Report issues at: https://github.com/Shriinivas/blenderbezierutils/issues
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
          files: |
            bezier_utils.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
